  - close_hfq
  - pre_close_hfq
  - turnover_rate
  - turnover_rate_f
  - volume_ratio
  - pe
  - pe_ttm
  - pb
  - ps
  - ps_ttm
  - dv_ratio
  - dv_ttm
  - total_share
